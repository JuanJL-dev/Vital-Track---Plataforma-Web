<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signos Vitales – VITALTRACK</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --navy: #1e3a8a;
            --navy-d: #122149;
            --navy-l: #c0d8ff;
            --accent: #3b82f6;
            --bg: #f0f2f5;
            --white: #fff;
            --ok: #16a34a;
            --danger: #dc2626;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            background: var(--white);
            padding: 14px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .06);
            gap: 12px;
        }

        .brand-text {
            font-family: 'DM Serif Display', serif;
            font-size: 22px;
            color: var(--navy);
            letter-spacing: 1px;
        }

        .app-bar {
            background: linear-gradient(90deg, var(--navy-d), var(--navy));
            padding: 0 40px;
            display: flex;
            justify-content: center;
        }

        .app-bar a {
            color: rgba(255, 255, 255, .8);
            text-decoration: none;
            padding: 14px 18px;
            font-size: 14px;
            font-weight: 500;
            border-bottom: 3px solid transparent;
            transition: color .2s;
        }

        .app-bar a:hover {
            color: #fff;
        }

        .app-bar a.active {
            color: #fff;
            border-bottom-color: var(--navy-l);
        }

        .hero {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, var(--navy-d), var(--navy));
            display: flex;
            align-items: flex-end;
            padding: 28px 40px;
            background-image: url('assets/img/img-signos.png');
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(18, 33, 73, .6);
        }

        .hero h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 42px;
            color: #fff;
            font-weight: normal;
            position: relative;
            z-index: 1;
        }

        .main {
            padding: 28px 40px;
            max-width: 1240px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
        }

        .section-heading {
            font-family: 'DM Serif Display', serif;
            font-size: 1.8rem;
            color: var(--navy);
            margin: 0 0 22px;
            font-weight: normal;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--white);
            padding: 14px 18px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .05);
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .search-wrap {
            position: relative;
        }

        .search-wrap i {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 16px;
        }

        .search-wrap input {
            padding: 10px 14px 10px 38px;
            border: 1.5px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            width: 260px;
            outline: none;
            font-family: 'DM Sans', sans-serif;
            transition: border-color .2s;
        }

        .search-wrap input:focus {
            border-color: var(--accent);
        }

        .table-wrap {
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 2px 10px rgba(0, 0, 0, .05);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        thead th {
            background: #f7f8fa;
            color: #6b7280;
            text-transform: uppercase;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .6px;
            padding: 14px 20px;
        }

        tbody td {
            padding: 14px 20px;
            border-bottom: 1px solid #f1f1f1;
            vertical-align: middle;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        tbody tr:hover {
            background: #fcfcff;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-green {
            background: #dcfce7;
            color: #15803d;
        }

        .badge-red {
            background: #fee2e2;
            color: #b91c1c;
        }

        .patient-avatar {
            width: 32px;
            height: 32px;
            background: var(--navy-l);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--navy);
            font-weight: 700;
            font-size: 13px;
            margin-right: 10px;
        }

        .name-cell {
            display: flex;
            align-items: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: all .2s;
        }

        .btn-navy {
            background: var(--navy);
            color: #fff;
        }

        .btn-navy:hover {
            background: var(--navy-d);
            color: #fff;
        }

        .loading-row td {
            text-align: center;
            color: #9ca3af;
            padding: 40px;
            font-style: italic;
        }

        .footer {
            background: var(--navy-d);
            color: #c0d8ff;
            padding: 30px 40px;
            text-align: center;
            margin-top: auto;
        }

        .footer-copy {
            font-size: 12px;
            color: #5b77a8;
            margin-top: 8px;
        }

        .btn-accent { background: var(--accent); color: #fff; margin-left: 8px; }
        .btn-accent:hover { background: #2563eb; color: #fff; }


        /* Centra la palabra "Acción" en el encabezado */
        thead th:last-child {
            text-align: center;
        }

        /* Centra los botones en las filas */
        tbody td:last-child {
            display: flex;
            justify-content: center; /* Los centra horizontalmente */
            align-items: center;     /* Los centra verticalmente */
            gap: 10px;               /* Da una separación perfecta entre botones */
        }
        
        /* 1. Mover la columna NOMBRE más a la derecha separándola del borde */
        thead th:first-child,
        tbody td:first-child {
            padding-left: 40px; /* Puedes subir o bajar este número a tu gusto */
        }

        /* 2. Centrar las columnas ESTADO (2) e ID (3) para que se distribuyan mejor */
        thead th:nth-child(2), tbody td:nth-child(2),
        thead th:nth-child(3), tbody td:nth-child(3) {
            text-align: center;
        }
    </style>
</head>

<body>
    <script>
        const userString = localStorage.getItem('vitaltrack_user');
        let user;
        if (!userString) { window.location.href = './Index.html'; } else { user = JSON.parse(userString); }
        const SUPABASE_URL = 'https://iqzndwgcavyklxxybfey.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlxem5kd2djYXZ5a2x4eHliZmV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNjQwNjUsImV4cCI6MjA5MDc0MDA2NX0.tFGKV1IKV1jvBKO2kh7l8XVEYPH8I3trDCEDuube08s';
        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        function cerrarSesion() { localStorage.removeItem('vitaltrack_user'); window.location.href = './Index.html'; }
    </script>
    <header>
        <div class="top-bar">
            <img src="assets/img/Logo.png" alt="Logo" style="width:36px;border-radius:8px;"
                onerror="this.style.display='none'">
            <span class="brand-text">VITALTRACK</span>
        </div>
        <nav class="app-bar">
            <a href="Home.html">Inicio</a>
            <a href="Usuarios.html">Usuarios</a>
            <a href="Signos.html" class="active">Signos</a>
            <a href="Soporte.html">Soporte</a>
            <a href="#" onclick="cerrarSesion()">Cerrar Sesión</a>
        </nav>
    </header>
    <div class="hero">
        <h1>Signos Vitales</h1>
    </div>
    <div class="main">
        <h2 class="section-heading">Seleccione un Paciente</h2>
        <div class="toolbar">
            <div class="search-wrap">
                <i class="bi bi-search"></i>
                <input type="text" id="search-input" placeholder="Buscar paciente…">
            </div>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Estado</th>
                        <th>ID</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr class="loading-row">
                        <td colspan="4">Cargando pacientes…</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <footer class="footer">
        <span style="font-family:'DM Serif Display',serif;font-size:18px;color:white;">VITALTRACK</span>
        <div class="footer-copy">&copy; 2025 Hospital's name – HNTEC-LTD</div>
    </footer>
    <script>
        let allPatients = [];
        const tableBody = document.getElementById('table-body');
        const searchInput = document.getElementById('search-input');
        function initials(n, a) { return ((n?.[0] || '') + (a?.[0] || '')).toUpperCase() || '?'; }
        function display(list) {
            if (!list.length) { tableBody.innerHTML = `<tr class="loading-row"><td colspan="4">No se encontraron pacientes.</td></tr>`; return; }
            tableBody.innerHTML = list.map(p => {
                const name = `${p.nombre || ''} ${p.apellido || ''}`.trim();
                const active = p.status?.toLowerCase() === 'activo';
                return `<tr>
                <td><div class="name-cell"><span class="patient-avatar">${initials(p.nombre, p.apellido)}</span>${name}</div></td>
                <td><span class="badge ${active ? 'badge-green' : 'badge-red'}"><i class="bi ${active ? 'bi-circle-fill' : 'bi-x-circle-fill'}"></i>${p.status || '?'}</span></td>
                <td style="font-size:11px;color:#9ca3af;font-family:monospace;">${(p.id || '').slice(0, 8)}…</td>
                <td><button class="btn btn-navy" onclick="window.location.href='MostrarSignos.html?id=${p.id}'"><i class="bi bi-heart-pulse-fill"></i> Ver Signos</button>
                <button class="btn btn-accent" onclick="window.location.href='Estadisticas.html?id=${p.id}'"><i class="bi bi-bar-chart-fill"></i> Estadísticas </button></td>
                

            </tr>`;
            }).join('');
        }
        async function load() {
            if (!user?.id) return;
            const { data, error } = await _supabase.from('pacientes').select('*').eq('doctor_id', user.id);
            if (error) { tableBody.innerHTML = `<tr class="loading-row"><td colspan="4">Error: ${error.message}</td></tr>`; return; }
            allPatients = data || []; display(allPatients);
        }
        searchInput.addEventListener('input', e => {
            const t = e.target.value.toLowerCase();
            display(allPatients.filter(p => `${p.nombre} ${p.apellido}`.toLowerCase().includes(t)));
        });
        document.addEventListener('DOMContentLoaded', load);
    </script>
<script src="alertas-globales.js"></script>
</body>

</html>
