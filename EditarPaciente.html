<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Paciente – VITALTRACK</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --navy: #1e3a8a;
            --navy-d: #122149;
            --navy-l: #c0d8ff;
            --accent: #3b82f6;
            --bg: #f0f2f5;
            --white: #fff;
            --danger: #e11d48;
            --ok: #16a34a;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: #1a1a2e;
            min-height: 100vh;
        }

        .top-bar {
            background: var(--white);
            padding: 14px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .06);
            gap: 12px;
            border-bottom: 3px solid var(--navy);
        }

        .brand-text {
            font-family: 'DM Serif Display', serif;
            font-size: 22px;
            color: var(--navy);
            letter-spacing: 1px;
        }

        .main-wrapper {
            max-width: 820px;
            margin: 40px auto;
            padding: 0 20px 60px;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 22px;
        }

        .breadcrumb a {
            color: var(--navy);
            text-decoration: none;
            font-weight: 500;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .breadcrumb span {
            color: #d1d5db;
        }

        .form-card {
            background: var(--white);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, .07);
            overflow: hidden;
        }

        .form-card-header {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            padding: 30px 40px;
            color: white;
        }

        .form-card-header h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 24px;
            font-weight: normal;
        }

        .form-card-header p {
            color: rgba(255, 255, 255, .8);
            font-size: 13px;
            margin-top: 5px;
        }

        .form-card-body {
            padding: 36px 40px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .form-group.full {
            grid-column: span 2;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: var(--navy);
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="number"],
        input[type="tel"],
        select {
            padding: 11px 14px;
            border: 1.5px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            background: #fafafa;
            color: #1a1a2e;
            outline: none;
            transition: border-color .2s;
        }

        input:focus,
        select:focus {
            border-color: var(--accent);
            background: white;
        }

        .divider-section {
            grid-column: span 2;
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 8px 0;
        }

        .divider-section span {
            font-size: 12px;
            font-weight: 700;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: .5px;
            white-space: nowrap;
        }

        .divider-section::before,
        .divider-section::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }

        #form-message {
            margin-top: 18px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            display: none;
        }

        #form-message.success {
            background: #f0fdf4;
            color: var(--ok);
            border: 1px solid #bbf7d0;
            display: block;
        }

        #form-message.error {
            background: #fff1f2;
            color: var(--danger);
            border: 1px solid #fecdd3;
            display: block;
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 28px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 11px 22px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: all .2s;
        }

        .btn-amber {
            background: #f59e0b;
            color: #fff;
        }

        .btn-amber:hover:not(:disabled) {
            background: #d97706;
        }

        .btn-amber:disabled {
            opacity: .55;
            cursor: not-allowed;
        }

        .btn-ghost {
            background: transparent;
            color: #6b7280;
            border: 1.5px solid #e5e7eb;
        }

        .btn-ghost:hover {
            background: #f3f4f6;
        }

        .status-toggle {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .status-opt {
            display: none;
        }

        .status-lbl {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all .2s;
        }

        .status-opt:checked+.status-lbl {
            border-color: currentColor;
        }

        .status-opt[value="Activo"]+.status-lbl {
            color: var(--ok);
            background: #f0fdf4;
        }

        .status-opt[value="Activo"]:checked+.status-lbl {
            border-color: var(--ok);
        }

        .status-opt[value="Inactivo"]+.status-lbl {
            color: var(--danger);
            background: #fff1f2;
        }

        .status-opt[value="Inactivo"]:checked+.status-lbl {
            border-color: var(--danger);
        }

        .skeleton {
            background: #f1f5f9;
            border-radius: 6px;
            animation: shimmer 1.2s infinite;
        }

        @keyframes shimmer {

            0%,
            100% {
                opacity: .7;
            }

            50% {
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="top-bar">
            <img src="assets/img/Logo.png" alt="Logo" style="width:34px;border-radius:6px;"
                onerror="this.style.display='none'">
            <span class="brand-text">VITALTRACK</span>
        </div>
    </header>

    <div class="main-wrapper">
        <div class="breadcrumb">
            <a href="Home.html">Inicio</a>
            <span>›</span>
            <a href="Usuarios.html">Usuarios</a>
            <span>›</span>
            <span id="breadcrumb-name">Editar Paciente</span>
        </div>

        <div class="form-card">
            <div class="form-card-header">
                <h1>Editar Paciente</h1>
                <p id="header-subtitle">Modifique la información del paciente seleccionado.</p>
            </div>
            <div class="form-card-body">
                <form id="edit-form" novalidate>
                    <div class="form-grid">
                        <div class="divider-section"><span>Datos personales</span></div>

                        <div class="form-group">
                            <label for="nombre">Nombre(s)</label>
                            <input type="text" id="nombre" required>
                        </div>
                        <div class="form-group">
                            <label for="apellido">Apellido(s)</label>
                            <input type="text" id="apellido" required>
                        </div>
                        <div class="form-group">
                            <label for="genero">Género</label>
                            <select id="genero">
                                <option value="">Seleccionar…</option>
                                <option>Masculino</option>
                                <option>Femenino</option>
                                <option>Otro</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="edad">Edad</label>
                            <input type="number" id="edad" min="0" max="120">
                        </div>
                        <div class="form-group full">
                            <label for="domicilio">Domicilio</label>
                            <input type="text" id="domicilio">
                        </div>

                        <div class="divider-section"><span>Contacto y acceso</span></div>

                        <div class="form-group">
                            <label for="telefono">Teléfono</label>
                            <input type="tel" id="telefono">
                        </div>
                        <div class="form-group">
                            <label for="email">Correo Electrónico</label>
                            <input type="email" id="email" required>
                        </div>
                        <div class="form-group">
                            <label for="contrasena">Contraseña</label>
                            <input type="text" id="contrasena" placeholder="Sin cambios si se deja vacío">
                        </div>

                        <div class="divider-section"><span>Estado del paciente</span></div>

                        <div class="form-group full">
                            <label>Estado en el sistema</label>
                            <div class="status-toggle">
                                <input type="radio" class="status-opt" name="status" id="status-activo" value="Activo">
                                <label class="status-lbl" for="status-activo">✓ Activo</label>
                                <input type="radio" class="status-opt" name="status" id="status-inactivo"
                                    value="Inactivo">
                                <label class="status-lbl" for="status-inactivo">✗ Inactivo</label>
                            </div>
                        </div>
                    </div>

                    <div id="form-message"></div>

                    <div class="form-actions">
                        <a href="Usuarios.html" class="btn btn-ghost">Cancelar</a>
                        <button type="submit" class="btn btn-amber" id="submit-btn">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M17 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z" />
                            </svg>
                            Guardar Cambios
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://iqzndwgcavyklxxybfey.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlxem5kd2djYXZ5a2x4eHliZmV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNjQwNjUsImV4cCI6MjA5MDc0MDA2NX0.tFGKV1IKV1jvBKO2kh7l8XVEYPH8I3trDCEDuube08s';
        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        if (!localStorage.getItem('vitaltrack_user')) { alert('Inicia sesión.'); window.location.href = './Index.html'; }

        const params = new URLSearchParams(window.location.search);
        const patientId = params.get('id');
        if (!patientId) { alert('Paciente no especificado.'); window.location.href = 'Usuarios.html'; }

        const msgEl = document.getElementById('form-message');
        const btn = document.getElementById('submit-btn');

        function showMsg(text, type) { msgEl.textContent = text; msgEl.className = type; msgEl.style.display = 'block'; }

        async function loadPatient() {
            const { data, error } = await _supabase.from('pacientes').select('*').eq('id', patientId).single();
            if (error || !data) { showMsg('Error al cargar datos del paciente.', 'error'); btn.disabled = true; return; }
            document.getElementById('nombre').value = data.nombre || '';
            document.getElementById('apellido').value = data.apellido || '';
            document.getElementById('genero').value = data.genero || '';
            document.getElementById('edad').value = data.edad || '';
            document.getElementById('domicilio').value = data.domicilio || '';
            document.getElementById('telefono').value = data.telefono || '';
            document.getElementById('email').value = data.correo || '';
            document.getElementById('contrasena').value = data.contrasena || '';
            const statusId = data.status?.toLowerCase() === 'activo' ? 'status-activo' : 'status-inactivo';
            document.getElementById(statusId).checked = true;
            const name = `${data.nombre} ${data.apellido}`;
            document.getElementById('breadcrumb-name').textContent = name;
            document.getElementById('header-subtitle').textContent = `Editando: ${name}`;
        }

        document.getElementById('edit-form').addEventListener('submit', async e => {
            e.preventDefault();
            msgEl.style.display = 'none';
            btn.disabled = true;
            btn.innerHTML = 'Guardando…';

            const nombreVal = document.getElementById('nombre').value.trim();
            const apellidoVal = document.getElementById('apellido').value.trim();
            const emailVal = document.getElementById('email').value.trim();
            const telefonoVal = document.getElementById('telefono').value.trim();

            const nameRegex = /^[A-Za-záéíóúÁÉÍÓÚñÑ\s]+$/;
            if (!nameRegex.test(nombreVal)) {
                showMsg('El nombre solo debe contener letras.', 'error');
                btn.disabled = false;
                btn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg> Guardar Cambios';
                return;
            }

            if (!nameRegex.test(apellidoVal)) {
                showMsg('El apellido solo debe contener letras.', 'error');
                btn.disabled = false;
                btn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg> Guardar Cambios';
                return;
            }

            const telRegex = /^\d+$/;
            if (telefonoVal && !telRegex.test(telefonoVal)) {
                showMsg('El teléfono solo debe contener números.', 'error');
                btn.disabled = false;
                btn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg> Guardar Cambios';
                return;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(emailVal)) {
                showMsg('Formato de correo electrónico inválido.', 'error');
                btn.disabled = false;
                btn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg> Guardar Cambios';
                return;
            }

            const status = document.querySelector('input[name="status"]:checked')?.value || 'Activo';
            const contrasenaVal = document.getElementById('contrasena').value.trim();

            const updated = {
                nombre: nombreVal,
                apellido: apellidoVal,
                genero: document.getElementById('genero').value || null,
                edad: document.getElementById('edad').value ? parseInt(document.getElementById('edad').value) : null,
                domicilio: document.getElementById('domicilio').value.trim() || null,
                telefono: telefonoVal || null,
                correo: emailVal,
                status
            };
            if (contrasenaVal) updated.contrasena = contrasenaVal;

            try {
                const { error } = await _supabase.from('pacientes').update(updated).eq('id', patientId);
                if (error) throw error;
                showMsg('¡Paciente actualizado exitosamente!', 'success');
                setTimeout(() => window.location.href = 'Usuarios.html', 1800);
            } catch (err) {
                showMsg('Error al guardar: ' + err.message, 'error');
            } finally {
                btn.disabled = false; btn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg> Guardar Cambios';
            }
        });

        document.addEventListener('DOMContentLoaded', loadPatient);
    </script>
    <script src="alertas-globales.js"></script>
</body>

</html>
