<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Paciente – VITALTRACK</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root{--navy:#1e3a8a;--navy-d:#122149;--navy-l:#c0d8ff;--accent:#3b82f6;--bg:#f0f2f5;--white:#fff;--danger:#e11d48;--ok:#16a34a;}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:#1a1a2e;min-height:100vh;}
        .top-bar{background:var(--white);padding:14px 40px;display:flex;justify-content:center;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.06);gap:12px;border-bottom:3px solid var(--navy);}
        .brand-text{font-family:'DM Serif Display',serif;font-size:22px;color:var(--navy);letter-spacing:1px;}
        .main-wrapper{max-width:820px;margin:40px auto;padding:0 20px 60px;}
        .breadcrumb{display:flex;align-items:center;gap:8px;font-size:13px;color:#6b7280;margin-bottom:22px;}
        .breadcrumb a{color:var(--navy);text-decoration:none;font-weight:500;}
        .breadcrumb a:hover{text-decoration:underline;}
        .breadcrumb span{color:#d1d5db;}
        .form-card{background:var(--white);border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.07);overflow:hidden;}
        .form-card-header{background:linear-gradient(135deg,var(--navy-d),var(--navy));padding:30px 40px;color:white;}
        .form-card-header h1{font-family:'DM Serif Display',serif;font-size:24px;font-weight:normal;}
        .form-card-header p{color:var(--navy-l);font-size:13px;margin-top:5px;}
        .form-card-body{padding:36px 40px;}
        .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
        .form-group{display:flex;flex-direction:column;gap:7px;}
        .form-group.full{grid-column:span 2;}
        label{font-size:13px;font-weight:600;color:var(--navy);}
        label .req{color:var(--danger);margin-left:2px;}
        input[type="text"],input[type="email"],input[type="password"],input[type="number"],input[type="tel"],select{
            padding:11px 14px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;
            font-family:'DM Sans',sans-serif;background:#fafafa;color:#1a1a2e;outline:none;transition:border-color .2s;}
        input:focus,select:focus{border-color:var(--accent);background:white;}
        .divider-section{grid-column:span 2;display:flex;align-items:center;gap:12px;margin:8px 0;}
        .divider-section span{font-size:12px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}
        .divider-section::before,.divider-section::after{content:'';flex:1;height:1px;background:#e5e7eb;}
        #form-message{margin-top:18px;padding:12px 16px;border-radius:8px;font-size:13px;font-weight:600;display:none;}
        #form-message.success{background:#f0fdf4;color:var(--ok);border:1px solid #bbf7d0;display:block;}
        #form-message.error{background:#fff1f2;color:var(--danger);border:1px solid #fecdd3;display:block;}
        .form-actions{display:flex;justify-content:flex-end;gap:12px;margin-top:28px;}
        .btn{display:inline-flex;align-items:center;gap:7px;padding:11px 22px;border-radius:8px;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;border:none;cursor:pointer;text-decoration:none;transition:all .2s;}
        .btn-navy{background:var(--navy);color:#fff;} .btn-navy:hover:not(:disabled){background:var(--navy-d);}
        .btn-navy:disabled{opacity:.55;cursor:not-allowed;}
        .btn-ghost{background:transparent;color:#6b7280;border:1.5px solid #e5e7eb;} .btn-ghost:hover{background:#f3f4f6;}
    </style>
</head>
<body>
<header>
    <div class="top-bar">
        <img src="assets/img/Logo.png" alt="Logo" style="width:34px;border-radius:6px;" onerror="this.style.display='none'">
        <span class="brand-text">VITALTRACK</span>
    </div>
</header>

<div class="main-wrapper">
    <div class="breadcrumb">
        <a href="Home.html">Inicio</a>
        <span>›</span>
        <a href="Usuarios.html">Usuarios</a>
        <span>›</span>
        <span>Registrar Paciente</span>
    </div>

    <div class="form-card">
        <div class="form-card-header">
            <h1>Registrar Nuevo Paciente</h1>
            <p>Complete la información para dar de alta al paciente en el sistema.</p>
        </div>
        <div class="form-card-body">
            <form id="add-form" novalidate>
                <div class="form-grid">
                    <div class="divider-section"><span>Datos personales</span></div>

                    <div class="form-group">
                        <label for="nombre">Nombre(s) <span class="req">*</span></label>
                        <input type="text" id="nombre" placeholder="Ej. Juan" required>
                    </div>
                    <div class="form-group">
                        <label for="apellido">Apellido(s) <span class="req">*</span></label>
                        <input type="text" id="apellido" placeholder="Ej. Pérez" required>
                    </div>
                    <div class="form-group">
                        <label for="genero">Género</label>
                        <select id="genero">
                            <option value="">Seleccionar…</option>
                            <option>Masculino</option>
                            <option>Femenino</option>
                            <option>Otro</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="edad">Edad</label>
                        <input type="number" id="edad" placeholder="Ej. 65" min="0" max="120">
                    </div>
                    <div class="form-group full">
                        <label for="domicilio">Domicilio</label>
                        <input type="text" id="domicilio" placeholder="Calle, Número, Colonia…">
                    </div>

                    <div class="divider-section"><span>Contacto y acceso</span></div>

                    <div class="form-group">
                        <label for="telefono">Teléfono</label>
                        <input type="tel" id="telefono" placeholder="10 dígitos">
                    </div>
                    <div class="form-group">
                        <label for="email">Correo Electrónico <span class="req">*</span></label>
                        <input type="email" id="email" placeholder="usuario@ejemplo.com" required>
                    </div>
                    <div class="form-group">
                        <label for="contrasena">Contraseña de App <span class="req">*</span></label>
                        <input type="password" id="contrasena" placeholder="Contraseña para app móvil" required>
                    </div>
                </div>

                <div id="form-message"></div>

                <div class="form-actions">
                    <a href="Usuarios.html" class="btn btn-ghost">Cancelar</a>
                    <button type="submit" class="btn btn-navy" id="submit-btn">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg>
                        Registrar Paciente
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL='https://iqzndwgcavyklxxybfey.supabase.co';
    const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlxem5kd2djYXZ5a2x4eHliZmV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNjQwNjUsImV4cCI6MjA5MDc0MDA2NX0.tFGKV1IKV1jvBKO2kh7l8XVEYPH8I3trDCEDuube08s';
    const{createClient}=supabase;
    const _supabase=createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

    const userStr=localStorage.getItem('vitaltrack_user');
    let doctor;
    if(!userStr){alert('Inicia sesión primero.');window.location.href='./Index.html';}
    else{doctor=JSON.parse(userStr);}

    const msgEl=document.getElementById('form-message');
    const btn=document.getElementById('submit-btn');

    function showMsg(text,type){msgEl.textContent=text;msgEl.className=type;msgEl.style.display='block';}

    document.getElementById('add-form').addEventListener('submit', async e => {
        e.preventDefault();
        msgEl.style.display='none';
        btn.disabled=true; btn.textContent='Guardando…';

        const nombre    = document.getElementById('nombre').value.trim();
        const apellido  = document.getElementById('apellido').value.trim();
        const email     = document.getElementById('email').value.trim();
        const contrasena= document.getElementById('contrasena').value.trim();

        if(!nombre||!apellido||!email||!contrasena){
            showMsg('Por favor completa todos los campos requeridos (*)','error');
            btn.disabled=false; btn.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg> Registrar Paciente';
            return;
        }

        try {
            const { error } = await _supabase.from('pacientes').insert([{
                nombre, apellido,
                genero:   document.getElementById('genero').value||null,
                edad:     document.getElementById('edad').value ? parseInt(document.getElementById('edad').value) : null,
                domicilio:document.getElementById('domicilio').value.trim()||null,
                telefono: document.getElementById('telefono').value.trim()||null,
                correo:   email,
                contrasena,
                status:   'Activo',
                doctor_id: doctor.id
            }]);
            if(error) throw error;
            showMsg('¡Paciente registrado exitosamente!','success');
            document.getElementById('add-form').reset();
            setTimeout(()=>window.location.href='Usuarios.html', 1800);
        } catch(err) {
            showMsg('Error al registrar: '+err.message,'error');
        } finally {
            btn.disabled=false; btn.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg> Registrar Paciente';
        }
    });
</script>
<script src="alertas-globales.js"></script>
</body>
</html>
