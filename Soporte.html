    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root{--navy:#1e3a8a;--navy-d:#122149;--navy-l:#c0d8ff;--bg:#f0f2f5;--white:#fff;}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:#1a1a2e;min-height:100vh;display:flex;flex-direction:column;}
        .top-bar{background:var(--white);padding:14px 40px;display:flex;justify-content:center;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.06);gap:12px;}
        .brand-text{font-family:'DM Serif Display',serif;font-size:22px;color:var(--navy);letter-spacing:1px;}
        .app-bar{background:linear-gradient(90deg,var(--navy-d),var(--navy));padding:0 40px;display:flex;justify-content:center;}
        .app-bar a{color:rgba(255,255,255,.8);text-decoration:none;padding:14px 18px;font-size:14px;font-weight:500;border-bottom:3px solid transparent;transition:color .2s;}
        .app-bar a:hover{color:#fff;} .app-bar a.active{color:#fff;border-bottom-color:var(--navy-l);}
        .hero{width:100%;height:220px;background:linear-gradient(135deg,var(--navy-d),var(--navy));display:flex;align-items:flex-end;padding:28px 40px;background-image:url('assets/img/img-soporte.png');background-size:cover;background-position:center;position:relative;}
        .hero::before{content:'';position:absolute;inset:0;background:rgba(18,33,73,.55);}
        .hero h1{font-family:'DM Serif Display',serif;font-size:36px;color:#fff;font-weight:normal;position:relative;z-index:1;}
        .main{padding:40px;max-width:860px;margin:0 auto;width:100%;flex:1;}
        .card{background:var(--white);border-radius:14px;box-shadow:0 4px 14px rgba(0,0,0,.06);padding:36px 40px;margin-bottom:28px;}
        .card h2{font-family:'DM Serif Display',serif;font-size:1.5rem;color:var(--navy);font-weight:normal;margin-bottom:24px;padding-bottom:14px;border-bottom:2px solid var(--navy-l);}
        /* Accordion */
        .faq-item{border-bottom:1px solid #f1f1f1;} .faq-item:last-child{border-bottom:none;}
        .faq-btn{width:100%;background:none;border:none;text-align:left;padding:18px 0;display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;color:#1a1a2e;gap:12px;}
        .faq-btn:hover{color:var(--navy);}
        .faq-btn i{font-size:18px;color:var(--navy);transition:transform .25s;flex-shrink:0;}
        .faq-btn[aria-expanded="true"] i{transform:rotate(180deg);}
        .faq-answer{max-height:0;overflow:hidden;transition:max-height .3s ease;}
        .faq-answer p{font-size:14px;color:#555;line-height:1.7;padding-bottom:18px;}
        /* CTA */
        .cta-card{background:linear-gradient(135deg,var(--navy-d),var(--navy));border-radius:14px;padding:36px 40px;color:white;text-align:center;}
        .cta-card h3{font-family:'DM Serif Display',serif;font-size:1.4rem;font-weight:normal;margin-bottom:8px;}
        .cta-card p{color:var(--navy-l);font-size:14px;margin-bottom:24px;}
        .btn-cta{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;background:#fff;color:var(--navy);border-radius:8px;text-decoration:none;font-weight:700;font-size:14px;transition:all .2s;}
        .btn-cta:hover{background:var(--navy-l);}
        .footer{background:var(--navy-d);color:#c0d8ff;padding:30px 40px;text-align:center;margin-top:auto;}
        .footer-copy{font-size:12px;color:#5b77a8;margin-top:8px;}
    </style>
</head>

<script>
    const faqs=[
        {q:'¿Cómo registrar un nuevo paciente?',a:'Accede a Usuarios → "Nuevo Paciente". Completa el formulario con nombre, correo, contraseña de app y datos personales. El paciente quedará vinculado automáticamente a tu cuenta y podrá usar la app móvil.'},
        {q:'¿Cómo vincular una pulsera IoT a un paciente?',a:'Asegúrate de que la pulsera esté encendida y en modo de emparejamiento. El simulador IoT insertará lecturas en la base de datos asociadas al paciente_id correspondiente. Revisa el módulo Signos para confirmar la recepción.'},
        {q:'¿Por qué los signos vitales no se actualizan?',a:'Verifica que el simulador IoT esté activo y apunte al paciente_id correcto. Confirma que Supabase Realtime esté habilitado en tu proyecto. Si el problema persiste, revisa la consola del navegador para errores de conexión.'},
        {q:'¿Cuándo se genera una alerta automática?',a:'El sistema genera alertas visuales y toasts en tiempo real cuando: BPM > 100 (ritmo cardíaco elevado) o SpO₂ < 90% (saturación de oxígeno crítica). Las alertas aparecen tanto en el Dashboard como en la pantalla de monitoreo individual.'},
        {q:'¿Cómo exportar el historial de un paciente?',a:'En la pantalla Usuarios, usa el botón "Exportar CSV" para descargar la lista completa de pacientes. Para historial de signos individuales, selecciona el paciente en el módulo Signos y usa las opciones disponibles.'},
        {q:'¿Qué hago si olvidé mi contraseña?',a:'Contacta al administrador del sistema o al equipo de soporte técnico usando el botón "Reportar un Problema" más abajo. Proporciona tu número de médico para que puedan restablecer el acceso.'},
    ];

    document.getElementById('faq-list').innerHTML=faqs.map((f,i)=>`
        <div class="faq-item">
            <button class="faq-btn" aria-expanded="false" onclick="toggleFaq(this,${i})">
                <span>${f.q}</span>
                <i class="bi bi-chevron-down"></i>
            </button>
            <div class="faq-answer" id="faq-ans-${i}">
                <p>${f.a}</p>
            </div>
        </div>`).join('');

    function toggleFaq(btn,idx){
        const ans=document.getElementById('faq-ans-'+idx);
        const isOpen=btn.getAttribute('aria-expanded')==='true';
        // Close all
        document.querySelectorAll('.faq-btn').forEach(b=>b.setAttribute('aria-expanded','false'));
        document.querySelectorAll('.faq-answer').forEach(a=>a.style.maxHeight='0');
        if(!isOpen){btn.setAttribute('aria-expanded','true');ans.style.maxHeight=ans.scrollHeight+'px';}
    }
</script>
<script src="alertas-globales.js"></script>
